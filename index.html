<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球旅途足跡 3D 雲端版</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans HK', sans-serif; }
        #globeViz { width: 100%; height: 500px; background-color: #0b1329; border-radius: 1rem; overflow: hidden; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div id="authSection" class="min-h-screen flex items-center justify-center px-4 bg-slate-900">
        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full space-y-6">
            <div class="text-center">
                <h2 class="text-2xl font-bold text-slate-950" id="authTitle">🌍 旅途足跡雲端備份</h2>
                <p class="text-sm text-slate-500 mt-1" id="authSubtitle">請登入以同步及長久儲存你的紀錄</p>
            </div>
            <form id="authForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">電郵地址</label>
                    <input type="email" id="authEmail" required class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">密碼</label>
                    <input type="password" id="authPassword" required minlength="6" class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-indigo-500">
                </div>
                <button type="submit" id="authBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-lg text-sm transition-colors shadow-sm">
                    登入
                </button>
            </form>
            <div class="text-center text-xs text-slate-500">
                <button type="button" id="switchAuthMode" class="text-indigo-600 hover:underline">未有帳號？按此註冊</button>
            </div>
        </div>
    </div>

    <div id="appSection" class="hidden">
        <header class="bg-slate-950 text-white shadow-md">
            <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                <h1 class="text-lg sm:text-xl font-bold flex items-center gap-2">🌍 全球旅途足跡 3D 雲端版</h1>
                <div class="flex items-center gap-3">
                    <span id="userDisplay" class="text-xs text-slate-400 hidden sm:inline"></span>
                    <button id="logoutBtn" class="text-xs bg-slate-800 border border-slate-700 hover:bg-slate-700 px-3 py-1 rounded-lg">登出</button>
                </div>
            </div>
        </header>

        <div class="bg-indigo-950 text-indigo-200 py-3 border-b border-indigo-900">
            <div class="max-w-7xl mx-auto px-4 flex gap-4 text-sm font-medium">
                <div id="totalCount">總行程: 0 條</div>
                <div id="totalDist">總距離: 0 km</div>
            </div>
        </div>

        <main class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
            <section class="lg:col-span-1 space-y-6">
                <div class="bg-slate-900 p-2 rounded-2xl border border-slate-800">
                    <div id="globeViz"></div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <form id="journeyForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">交通工具</label>
                            <div class="grid grid-cols-2 gap-2">
                                <button type="button" id="typeFlight" class="py-2 rounded-lg font-medium border text-center text-sm bg-indigo-50 border-indigo-600 text-indigo-600">✈️ 飛行</button>
                                <button type="button" id="typeRail" class="py-2 rounded-lg font-medium border text-center text-sm bg-white border-slate-200 text-slate-600 hover:bg-slate-50">🚄 鐵路</button>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label for="date" class="block text-sm font-medium text-slate-600 mb-1">日期</label>
                                <input type="date" id="date" required class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm">
                            </div>
                            <div>
                                <label id="codeLabel" class="block text-sm font-medium text-slate-600 mb-1">航班編號</label>
                                <input type="text" id="code" required class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm uppercase" placeholder="e.g. CX504">
                            </div>
                        </div>

                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3">
                            <span class="font-bold text-slate-700 text-xs flex items-center gap-1">🌐 航線地點設定</span>
                            
                            <div>
                                <label class="block text-[11px] font-medium text-slate-500 mb-0.5">出發起點</label>
                                <select id="fromAirportSelect" required class="w-full p-2 border border-slate-200 bg-white rounded-lg text-sm focus:outline-indigo-500">
                                    <option value="">正在載入全球機場數據...</option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-[11px] font-medium text-slate-500 mb-0.5">目的地</label>
                                <select id="toAirportSelect" required class="w-full p-2 border border-slate-200 bg-white rounded-lg text-sm focus:outline-indigo-500">
                                    <option value="">正在載入全球機場數據...</option>
                                </select>
                            </div>

                            <div class="pt-2 border-t border-dashed border-slate-200 flex justify-between text-xs text-slate-500">
                                <span>自動計算預估距離:</span>
                                <span id="autoDistanceDisplay" class="font-bold text-indigo-600">0 km</span>
                            </div>
                        </div>

                        <input type="hidden" id="distance" value="0">
                        <input type="hidden" id="fromName">
                        <input type="hidden" id="fromLat">
                        <input type="hidden" id="fromLon">
                        <input type="hidden" id="toName">
                        <input type="hidden" id="toLat">
                        <input type="hidden" id="toLon">

                        <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-2 rounded-lg text-sm transition-colors shadow-sm">➕ 新增行程紀錄</button>
                    </form>
                </div>
            </section>

            <section class="lg:col-span-2">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                        <h3 class="font-bold text-slate-900">📜 我的歷史行程清單</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse text-sm">
                            <thead>
                                <tr class="bg-slate-50 text-slate-500 border-b border-slate-100 text-xs font-semibold uppercase">
                                    <th class="px-6 py-3">類型</th>
                                    <th class="px-6 py-3">日期</th>
                                    <th class="px-6 py-3">編號/名稱</th>
                                    <th class="px-6 py-3">航線 (由 ➡️ 至)</th>
                                    <th class="px-6 py-3">距離</th>
                                    <th class="px-6 py-3 text-center">操作</th>
                                </tr>
                            </thead>
                            <tbody id="journeyTableBody" class="divide-y divide-slate-100 text-slate-700">
                                </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 你的 Firebase 金鑰 配置
        const firebaseConfig = {
            apiKey: "AIzaSyAW7hojp_oeupvEUOyeaLJESn_1Ri34ue0",
            authDomain: "kanou-travel-tracker.firebaseapp.com",
            projectId: "kanou-travel-tracker",
            storageBucket: "kanou-travel-tracker.firebasestorage.app",
            messagingSenderId: "638827344678",
            appId: "1:638827344678:web:e339aeeef730c73c3d07e7",
            measurementId: "G-TXB2SVBC12"
        };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 狀態變數
        let currentAuthMode = 'login'; 
        let currentType = 'Flight';
        let currentUser = null;
        let globe = null;
        let airportDatabase = []; // 用於存放全球主要機場數據

        // 畫面元素綁定
        const authSection = document.getElementById('authSection');
        const appSection = document.getElementById('appSection');
        const authForm = document.getElementById('authForm');
        const authEmail = document.getElementById('authEmail');
        const authPassword = document.getElementById('authPassword');
        const authBtn = document.getElementById('authBtn');
        const authTitle = document.getElementById('authTitle');
        const authSubtitle = document.getElementById('authSubtitle');
        const switchAuthMode = document.getElementById('switchAuthMode');
        const userDisplay = document.getElementById('userDisplay');
        const logoutBtn = document.getElementById('logoutBtn');
        const journeyForm = document.getElementById('journeyForm');
        const fromAirportSelect = document.getElementById('fromAirportSelect');
        const toAirportSelect = document.getElementById('toAirportSelect');
        const autoDistanceDisplay = document.getElementById('autoDistanceDisplay');

        // 載入全球機場數據
        async function fetchAirports() {
            try {
                // 讀取包含全球主要城市及機場代碼的開源潔淨數據
                const res = await fetch('https://raw.githubusercontent.com/mwgg/Airports/master/airports.json');
                const data = await res.json();
                
                // 過濾並整理成易用的陣列，只留有包含 IATA 代碼的常規機場
                airportDatabase = Object.values(data)
                    .filter(a => a.iata && a.iata.length === 3 && a.name)
                    .map(a => ({
                        iata: a.iata,
                        name: `${a.iata} - ${a.city || ''} ${a.name}`,
                        city: a.city || a.name,
                        lat: Number(a.lat),
                        lon: Number(a.lon)
                    }))
                    .sort((a, b) => a.iata.localeCompare(b.iata));

                // 渲染至 Dropdown 選單中
                renderAirportOptions();
            } catch (err) {
                console.error("無法加載機場數據:", err);
                fromAirportSelect.innerHTML = `<option value="">加載失敗，請重試</option>`;
                toAirportSelect.innerHTML = `<option value="">加載失敗，請重試</option>`;
            }
        }

        function renderAirportOptions() {
            let optionsHtml = `<option value="">-- 請選擇地區/機場 --</option>`;
            airportDatabase.forEach(ap => {
                optionsHtml += `<option value="${ap.iata}">${ap.name}</option>`;
            });
            fromAirportSelect.innerHTML = optionsHtml;
            toAirportSelect.innerHTML = optionsHtml;

            // 預設將出發地指去香港(HKG)，方便日常使用
            if (airportDatabase.some(a => a.iata === 'HKG')) {
                fromAirportSelect.value = 'HKG';
                updateRouteCalculations();
            }
        }

        // 大圓距離計算公式 (Haversine Formula) - 精確算出地球兩點距離
        function calculateHaversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // 地球平均半徑 (公里)
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = 
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return Math.round(R * c); // 傳回整數公里數
        }

        // 監聽選單變更，自動更新距離與隱藏欄位
        function updateRouteCalculations() {
            const fromAp = airportDatabase.find(a => a.iata === fromAirportSelect.value);
            const toAp = airportDatabase.find(a => a.iata === toAirportSelect.value);

            if (fromAp && toAp) {
                const dist = calculateHaversineDistance(fromAp.lat, fromAp.lon, toAp.lat, toAp.lon);
                
                // 寫入後台隱藏 input
                document.getElementById('distance').value = dist;
                document.getElementById('fromName').value = `${fromAp.city} (${fromAp.iata})`;
                document.getElementById('fromLat').value = fromAp.lat;
                document.getElementById('fromLon').value = fromAp.lon;
                document.getElementById('toName').value = `${toAp.city} (${toAp.iata})`;
                document.getElementById('toLat').value = toAp.lat;
                document.getElementById('toLon').value = toAp.lon;

                // 畫面更新顯示
                autoDistanceDisplay.innerText = `${dist.toLocaleString()} km`;
            } else {
                document.getElementById('distance').value = "0";
                autoDistanceDisplay.innerText = `0 km`;
            }
        }

        fromAirportSelect.addEventListener('change', updateRouteCalculations);
        toAirportSelect.addEventListener('change', updateRouteCalculations);

        // 初始化 3D 地球
        function initGlobe() {
            if (globe) return;
            globe = Globe()(document.getElementById('globeViz'))
                .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
                .arcsData([])
                .arcColor(() => '#6366f1')
                .arcAltitude(0.2)
                .arcStroke(1.5)
                .arcDashLength(0.4)
                .arcDashGap(0.2)
                .arcDashAnimateTime(2000);
            
            setTimeout(() => {
                globe.pointOfView({ lat: 22.3, lng: 114.1, alt: 2.5 }, 1000);
            }, 500);
        }

        // 切換 登入 / 註冊 介面模式
        switchAuthMode.addEventListener('click', () => {
            if (currentAuthMode === 'login') {
                currentAuthMode = 'register';
                authTitle.innerText = '✨ 註冊新帳號';
                authSubtitle.innerText = '建立您的足跡雲端帳戶';
                authBtn.innerText = '註冊新帳號';
                switchAuthMode.innerText = '已有帳號？按此登入';
            } else {
                currentAuthMode = 'login';
                authTitle.innerText = '🌍 旅途足跡雲端備份';
                authSubtitle.innerText = '請登入以同步及長久儲存你的紀錄';
                authBtn.innerText = '登入';
                switchAuthMode.innerText = '未有帳號？按此註冊';
            }
        });

        // 處理 表單遞交 (登入/註冊)
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = authEmail.value;
            const password = authPassword.value;

            try {
                if (currentAuthMode === 'register') {
                    await createUserWithEmailAndPassword(auth, email, password);
                    alert('帳號註冊成功！已自動為您登入。');
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
            } catch (error) {
                console.error("驗證發生錯誤:", error);
                alert('操作失敗: ' + error.message);
            }
        });

        // 監聽用戶登入狀態
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                userDisplay.innerText = `👤 ${user.email}`;
                userDisplay.classList.remove('hidden');
                authSection.classList.add('hidden');
                appSection.classList.remove('hidden');
                initGlobe();
                fetchAirports(); // 登入成功後下載機場名單
                loadJourneys(user.uid);
            } else {
                currentUser = null;
                authSection.classList.remove('hidden');
                appSection.classList.add('hidden');
            }
        });

        // 登出功能
        logoutBtn.addEventListener('click', () => {
            signOut(auth).then(() => {
                authForm.reset();
                currentAuthMode = 'login';
            });
        });

        // 交通工具切換
        window.setType = function(type) {
            currentType = type;
            const btnFlight = document.getElementById('typeFlight');
            const btnRail = document.getElementById('typeRail');
            const codeLabel = document.getElementById('codeLabel');

            if (type === 'Flight') {
                btnFlight.className = "py-2 rounded-lg font-medium border text-center text-sm bg-indigo-50 border-indigo-600 text-indigo-600";
                btnRail.className = "py-2 rounded-lg font-medium border text-center text-sm bg-white border-slate-200 text-slate-600 hover:bg-slate-50";
                codeLabel.innerText = "航班編號";
            } else {
                btnRail.className = "py-2 rounded-lg font-medium border text-center text-sm bg-indigo-50 border-indigo-600 text-indigo-600";
                btnFlight.className = "py-2 rounded-lg font-medium border text-center text-sm bg-white border-slate-200 text-slate-600 hover:bg-slate-50";
                codeLabel.innerText = "列車車次";
            }
        }
        document.getElementById('typeFlight').addEventListener('click', () => setType('Flight'));
        document.getElementById('typeRail').addEventListener('click', () => setType('Rail'));

        // 遞交新增行程資料至 Firestore
        journeyForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            const distVal = Number(document.getElementById('distance').value);
            if (distVal <= 0) {
                alert("請先選擇有效的起點和目的地機場！");
                return;
            }

            try {
                await addDoc(collection(db, "journeys"), {
                    uid: currentUser.uid,
                    type: currentType,
                    date: document.getElementById('date').value,
                    distance: distVal,
                    code: document.getElementById('code').value.toUpperCase(),
                    fromName: document.getElementById('fromName').value,
                    fromLat: Number(document.getElementById('fromLat').value),
                    fromLon: Number(document.getElementById('fromLon').value),
                    toName: document.getElementById('toName').value,
                    toLat: Number(document.getElementById('toLat').value),
                    toLon: Number(document.getElementById('toLon').value)
                });
                
                // 重設表單（只留起點為香港）
                journeyForm.reset();
                setType('Flight');
                if (fromAirportSelect.querySelector('option[value="HKG"]')) {
                    fromAirportSelect.value = 'HKG';
                }
                updateRouteCalculations();
                
                alert('行程成功同步至雲端數據庫！');
            } catch (error) {
                console.error("儲存行程失敗:", error);
                alert("儲存失敗: " + error.message);
            }
        });

        // 即時從 Firestore 載入數據並更新地球和清單
        function loadJourneys(uid) {
            const q = query(collection(db, "journeys"), where("uid", "==", uid));
            onSnapshot(q, (snapshot) => {
                const journeys = [];
                let totalDistance = 0;
                const tableBody = document.getElementById('journeyTableBody');
                tableBody.innerHTML = '';

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    data.id = doc.id;
                    journeys.push(data);
                    totalDistance += data.distance;

                    // 渲染表格 HTML
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50 transition-colors";
                    tr.innerHTML = `
                        <td class="px-6 py-4 font-medium">${data.type === 'Flight' ? '✈️ 飛行' : '🚄 鐵路'}</td>
                        <td class="px-6 py-4 text-slate-500">${data.date}</td>
                        <td class="px-6 py-4 font-mono text-xs">${data.code}</td>
                        <td class="px-6 py-4">${data.fromName} ➡️ ${data.toName}</td>
                        <td class="px-6 py-4 text-slate-500">${data.distance} km</td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="deleteJourney('${data.id}')" class="text-xs text-red-600 hover:text-red-800 font-medium">刪除</button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });

                // 更新數據看板
                document.getElementById('totalCount').innerText = `總行程: ${journeys.length} 條`;
                document.getElementById('totalDist').innerText = `總距離: ${totalDistance.toLocaleString()} km`;

                // 將數據餵給 3D 地球畫弧線
                const arcs = journeys.map(j => ({
                    startLat: j.fromLat,
                    startLng: j.fromLon,
                    endLat: j.toLat,
                    endLng: j.toLon
                }));
                if (globe) globe.arcsData(arcs);
            });
        }

        // 刪除行程
        window.deleteJourney = async function(id) {
            if (confirm('確定要永久刪除此條行程備份嗎？')) {
                try {
                    await deleteDoc(doc(db, "journeys", id));
                } catch (error) {
                    alert('刪除失敗: ' + error.message);
                }
            }
        }
    </script>
</body>
</html>
