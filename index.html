        async function fetchAirports() {
            try {
                const res = await fetch('https://raw.githubusercontent.com/mwgg/Airports/master/airports.json');
                const data = await res.json();
                airportDatabase = Object.values(data)
                    .filter(a => a.iata && a.iata.length === 3 && a.name)
                    .map(a => ({
                        code: a.iata.toUpperCase(),
                        name: `${a.city || ''} ${a.name} (${a.country || ''})`,
                        lat: Number(a.lat),
                        lon: Number(a.lon)
                    }));
                renderHubOptions();
            } catch (err) { console.error(err); }
        }

        function renderHubOptions() {
            let optionsHtml = '';
            let dbToUse = [];
            if (currentType === 'Flight') dbToUse = airportDatabase;
            else if (currentType === 'HSR') dbToUse = hsrDatabase;
            else if (currentType === 'JR') dbToUse = jrDatabase;
            
            dbToUse.forEach(item => {
                optionsHtml += `<option value="${item.code}">${item.name}</option>`;
            });
            hubOptions.innerHTML = optionsHtml;
        }

        function calculateHaversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return Math.round(R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)))); 
        }

        function formatMinutesToHours(totalMinutes) {
            if (!totalMinutes || totalMinutes <= 0) return "0分鐘";
            const hours = Math.floor(totalMinutes / 60);
            const minutes = totalMinutes % 60;
            if (hours === 0) return `${minutes}分鐘`;
            return `${hours}小時 ${minutes}分鐘`;
        }

        function updateRouteCalculations() {
            const fromCode = fromHubInput.value.trim().toUpperCase();
            const toCode = toHubInput.value.trim().toUpperCase();
            
            let dbToUse = [];
            let speed = 800; 
            if (currentType === 'Flight') { dbToUse = airportDatabase; speed = 800; }
            else if (currentType === 'HSR') { dbToUse = hsrDatabase; speed = 300; } 
            else if (currentType === 'JR') { dbToUse = jrDatabase; speed = 260; }   

            const fromObj = dbToUse.find(item => item.code === fromCode);
            const toObj = dbToUse.find(item => item.code === toCode);

            if (fromObj) {
                fromDisplayRealName.innerText = fromObj.name;
                document.getElementById('fromName').value = fromObj.name.split(' (')[0];
                document.getElementById('fromLat').value = fromObj.lat;
                document.getElementById('fromLon').value = fromObj.lon;
            } else { fromDisplayRealName.innerText = fromCode ? "未識別的代碼/站名" : "-"; }

            if (toObj) {
                toDisplayRealName.innerText = toObj.name;
                document.getElementById('toName').value = toObj.name.split(' (')[0];
                document.getElementById('toLat').value = toObj.lat;
                document.getElementById('toLon').value = toObj.lon;
            } else { toDisplayRealName.innerText = toCode ? "未識別的代碼/站名" : "-"; }

            if (fromObj && toObj) {
                const dist = calculateHaversineDistance(fromObj.lat, fromObj.lon, toObj.lat, toObj.lon);
                const durationMins = Math.max(15, Math.round((dist / speed) * 60));
                
                document.getElementById('distance').value = dist;
                document.getElementById('durationMinutes').value = durationMins;
                autoDistanceDisplay.innerText = `${dist.toLocaleString()} km (${formatMinutesToHours(durationMins)})`;
            } else {
                document.getElementById('distance').value = "0";
                document.getElementById('durationMinutes').value = "0";
                autoDistanceDisplay.innerText = `0 km (0分鐘)`;
            }
        }

        fromHubInput.addEventListener('input', updateRouteCalculations);
        toHubInput.addEventListener('input', updateRouteCalculations);

        // 🌟 初始化 3D 地球（全新配色組合）
        function initGlobe() {
            if (globe) return;
            globe = Globe()(document.getElementById('globeViz'))
                .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
                .arcsData([])
                // 🎨 顏色修訂：飛機（橙色）、高鐵（藍色）、JR（綠色）
                .arcColor((d) => {
                    if (d.type === 'Flight') return '#ff8800'; // ✈️ 飛機：極致螢光橙
                    if (d.type === 'HSR') return '#00d4ff';    // 🚄 高鐵：螢光電子藍
                    return '#39ff14';                           // 🚅 JR：螢光電流綠
                })
                .arcAltitude((d) => d.type === 'Flight' ? 0.22 : 0.07) 
                .arcStroke(0.3) // 所有人同步變幼
                .arcDashLength(null)
                .arcDashGap(null)
                .arcDashAnimateTime(null);
            
            setTimeout(() => globe.pointOfView({ lat: 30, lng: 120, alt: 2.2 }, 1000), 500);

            // 🧠 滾動/拖拽地球時才動態閃爍一次
            let interactionTimer = null;
            const container = document.getElementById('globeViz');

            function triggerPulseAnimation() {
                if (!globe || globalJourneysBackup.length === 0) return;
                
                globe.arcDashLength(0.4)
                     .arcDashGap(0.15)
                     .arcDashAnimateTime(6000);

                clearTimeout(interactionTimer);
                interactionTimer = setTimeout(() => {
                    globe.arcDashLength(null)
                         .arcDashGap(null)
                         .arcDashAnimateTime(null);
                }, 3500);
            }

            container.addEventListener('wheel', triggerPulseAnimation, { passive: true });
            container.addEventListener('pointerdown', triggerPulseAnimation, { passive: true });
        }

        window.setUiType = function(type) {
            currentType = type;

            btnHSR.className = unselected;

                toHubInput.placeholder = "e.g. GZNS / SZN / 廣州南";
                fromHubInput.value = 'XHK'; 
            } else if (type === 'JR') {
                btnJR.className = "py-2 px-1 rounded-lg font-medium border text-center text-xs bg-emerald-50 border-emerald-600 text-emerald-600";
                codeLabel.innerText = "新幹線車次";
                hubConfigTitle.innerText = "🚅 日本 JR 設定 (新幹線核心路網)";
                fromHubLabel.innerText = "出發 JR 車站 (代碼/中文)";
                toHubLabel.innerText = "到達 JR 車站 (代碼/中文)";
                fromHubInput.placeholder = "e.g. TYO / SNA / 東京";
                toHubInput.placeholder = "e.g. KYT / SNA / 京都";
                fromHubInput.value = 'TYO'; 
            }
            updateRouteCalculations();
        }
        
        document.getElementById('typeFlight').addEventListener('click', () => setUiType('Flight'));
        document.getElementById('typeHSR').addEventListener('click', () => setUiType('HSR'));
        document.getElementById('typeJR').addEventListener('click', () => setUiType('JR'));

        switchAuthMode.addEventListener('click', () => {
            if (currentAuthMode === 'login') {
                currentAuthMode = 'register';
                authTitle.innerText = '✨ 註冊新帳號'; authSubtitle.innerText = '建立您的足跡雲端帳戶'; authBtn.innerText = '註冊新帳號'; switchAuthMode.innerText = '已有帳號？按此登入';
            } else {
                currentAuthMode = 'login';
                authTitle.innerText = '🌍 旅途足跡雲端備份'; authSubtitle.innerText = '請登入以同步及長久儲存你的紀錄'; authBtn.innerText = '登入'; switchAuthMode.innerText = '未有帳號？按此註冊';
            }
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                if (currentAuthMode === 'register') { await createUserWithEmailAndPassword(auth, authEmail.value, authPassword.value); alert('帳號註冊成功！'); }
                else { await signInWithEmailAndPassword(auth, authEmail.value, authPassword.value); }
            } catch (error) { alert('操作失敗: ' + error.message); }
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                userDisplay.innerText = `👤 ${user.email}`;
                userDisplay.classList.remove('hidden'); authSection.classList.add('hidden'); appSection.classList.remove('hidden');
                initGlobe(); fetchAirports(); loadJourneys(user.uid);
            } else { currentUser = null; authSection.classList.remove('hidden'); appSection.classList.add('hidden'); }
        });

        logoutBtn.addEventListener('click', () => signOut(auth));

        journeyForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            const distVal = Number(document.getElementById('distance').value);
            const durationVal = Number(document.getElementById('durationMinutes').value);
            if (distVal <= 0) { alert("請輸入正確且有效的出發/到達點！"); return; }

            try {
                await addDoc(collection(db, "journeys"), {
                    uid: currentUser.uid,
                    type: currentType, 
                    date: document.getElementById('date').value,
                    distance: distVal,
                    durationMinutes: durationVal, 
                    code: document.getElementById('code').value.toUpperCase(),
                    fromName: document.getElementById('fromName').value,
                    fromLat: Number(document.getElementById('fromLat').value),
                    fromLon: Number(document.getElementById('fromLon').value),
                    toName: document.getElementById('toName').value,
                    toLat: Number(document.getElementById('toLat').value),
                    toLon: Number(document.getElementById('toLon').value)
                });
                journeyForm.reset();
                setUiType(currentType);
                alert('行程成功記錄到雲端數據庫！');
            } catch (error) { alert("儲存失敗: " + error.message); }
        });

        function loadJourneys(uid) {
            const q = query(collection(db, "journeys"), where("uid", "==", uid));
            onSnapshot(q, (snapshot) => {
                const journeys = [];
                let totalDistance = 0;
                let totalMinutes = 0; 
                const tableBody = document.getElementById('journeyTableBody');
                tableBody.innerHTML = '';

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    data.id = doc.id;
                    journeys.push(data);
                    
                    totalDistance += data.distance;
                    const mins = data.durationMinutes || Math.max(15, Math.round((data.distance / 800) * 60));
                    totalMinutes += mins;

                    let badge = '✈️ 飛行';
                    if (data.type === 'HSR') badge = '🚄 高鐵';
                    if (data.type === 'JR') badge = '🚅 日本JR';

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50 transition-colors";
                    tr.innerHTML = `
                        <td class="px-6 py-4 font-medium">${badge}</td>
                        <td class="px-6 py-4 text-slate-500">${data.date}</td>
                        <td class="px-6 py-4 font-mono text-xs">${data.code}</td>
                        <td class="px-6 py-4">${data.fromName} ➡️ ${data.toName}</td>
                        <td class="px-6 py-4 text-slate-500">${data.distance} km <span class="text-xs text-slate-400">(${formatMinutesToHours(mins)})</span></td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="deleteJourney('${data.id}')" class="text-xs text-red-600 hover:text-red-800 font-medium">刪除</button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });

                document.getElementById('totalCount').innerText = `總行程: ${journeys.length} 條`;
                document.getElementById('totalDist').innerText = `總距離: ${totalDistance.toLocaleString()} km`;
                document.getElementById('totalTime').innerText = `總時間: ${formatMinutesToHours(totalMinutes)}`;

                const arcs = journeys.map(j => ({
                    startLat: j.fromLat, startLng: j.fromLon,
                    endLat: j.toLat, endLng: j.toLon,
                    type: j.type
                }));
                
                globalJourneysBackup = arcs; 
                if (globe) globe.arcsData(arcs);
            });
        }

        window.deleteJourney = async function(id) {
            if (confirm('確定要永久刪除此條行程備份嗎？')) {
                try { await deleteDoc(doc(db, "journeys", id)); } catch (error) { alert(error.message); }
            }
        }
    </script>
</body>
</html>
