<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球旅途足跡 3D 雲端版</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans HK', sans-serif; }
        #globeViz { width: 100%; height: 320px; background-color: #0b1329; border-radius: 1rem; overflow: hidden; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div id="authSection" class="min-h-screen flex items-center justify-center px-4 bg-slate-900">
        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full space-y-6">
            <div class="text-center">
                <h2 class="text-2xl font-bold text-slate-950">🌍 旅途足跡雲端備份</h2>
                <p class="text-sm text-slate-500 mt-1" id="authSubtitle">請登入以同步及長久儲存你的紀錄</p>
            </div>
            <form id="authForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">電郵地址</label>
                    <input type="email" id="authEmail" required class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">密碼</label>
                    <input type="password" id="authPassword" required minlength="6" class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-indigo-500">
                </div>
                <button type="submit" id="authBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-lg text-sm transition-colors shadow-sm">
                    登入
                </button>
            </form>
            <div class="text-center text-xs text-slate-500">
                <button type="button" id="switchAuthMode" class="text-indigo-600 hover:underline">未有帳號？按此註冊</button>
            </div>
        </div>
    </div>

    <div id="appSection" class="hidden">
        <header class="bg-slate-950 text-white shadow-md">
            <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                <h1 class="text-lg sm:text-xl font-bold flex items-center gap-2">🌍 全球旅途足跡 3D 雲端版</h1>
                <div class="flex items-center gap-3">
                    <span id="userDisplay" class="text-xs text-slate-400 hidden sm:inline"></span>
                    <button onclick="logout()" class="text-xs bg-slate-800 border border-slate-700 hover:bg-slate-700 px-3 py-1 rounded-lg">登出</button>
                </div>
            </div>
        </header>

        <div class="bg-indigo-950 text-indigo-200 py-3 border-b border-indigo-900">
            <div class="max-w-7xl mx-auto px-4 flex gap-4 text-sm font-medium">
                <div id="totalCount">總行程: 0 條</div>
                <div id="totalDist">總距離: 0 km</div>
            </div>
        </div>

        <main class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
            <section class="lg:col-span-1 space-y-6">
                <div class="bg-slate-900 p-2 rounded-2xl border border-slate-800">
                    <div id="globeViz"></div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <form id="journeyForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">交通工具</label>
                            <div class="grid grid-cols-2 gap-2">
                                <button type="button" id="typeFlight" onclick="setType('Flight')" class="py-2 rounded-lg font-medium border text-center text-sm bg-indigo-50 border-indigo-600 text-indigo-600">✈️ 飛行</button>
                                <button type="button" id="typeRail" onclick="setType('Rail')" class="py-2 rounded-lg font-medium border text-center text-sm bg-white border-slate-200 text-slate-600 hover:bg-slate-50">🚄 鐵路</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label for="date" class="block text-sm font-medium text-slate-600 mb-1">日期</label>
                                <input type="date" id="date" required class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm">
                            </div>
                            <div>
                                <label for="distance" class="block text-sm font-medium text-slate-600 mb-1">距離 (km)</label>
                                <input type="number" id="distance" min="0" required class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm">
                            </div>
                        </div>
                        <div>
                            <label id="codeLabel" class="block text-sm font-medium text-slate-600 mb-1">航班編號</label>
                            <input type="text" id="code" required class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm uppercase">
                        </div>
                        <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 space-y-2 text-xs">
                            <span class="font-bold text-slate-500 block">🌐 地球航線坐標設定</span>
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <input type="text" id="fromName" placeholder="出發城市 (e.g. 香港)" required class="w-full p-1 border rounded mb-1 text-xs">
                                    <div class="flex gap-1"><input type="number" step="any" id="fromLat" placeholder="緯度" required class="w-1/2 p-0.5 border rounded text-[11px]"><input type="number" step="any" id="fromLon" placeholder="經度" required class="w-1/2 p-0.5 border rounded text-[11px]"></div>
                                </div>
                                <div>
                                    <input type="text" id="toName" placeholder="目的地 (e.g. 東京)" required class="w-full p-1 border rounded mb-1 text-xs">
                                    <div class="flex gap-1"><input type="number" step="any" id="toLat" placeholder="緯度" required class
